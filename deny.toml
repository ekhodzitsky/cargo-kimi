# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-git = []
