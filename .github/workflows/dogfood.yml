name: Dogfood

on:
  push:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/dogfood.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/dogfood.yml'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-self:
    name: cargo-kimi checks itself
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@ea165f8d65b6e75b540449e92b4886f43607fa02 # stable

      - name: Install cargo-kimi
        run: cargo install --path . --locked

      - name: Run tests
        run: RUST_TEST_THREADS=1 cargo test

      - name: Generate badge
        run: cargo kimi badge --strictness standard

      - name: Commit badge if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add kimi-score.svg
          git diff --cached --quiet || git commit -m "Update kimi score badge"
          git push || true
        continue-on-error: true

      - name: Run cargo-kimi verify
        run: cargo kimi verify
