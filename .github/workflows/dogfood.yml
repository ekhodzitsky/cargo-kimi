name: Dogfood

on:
  push:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/dogfood.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - '.github/workflows/dogfood.yml'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-self:
    name: cargo-kimi checks itself
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-kimi
        run: cargo install --path . --locked

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny
        run: cargo deny check

      - name: Run tests
        run: RUST_TEST_THREADS=1 cargo test

      - name: Generate badge
        run: cargo kimi badge --strictness standard

      - name: Commit badge if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add kimi-score.svg
          git diff --cached --quiet || git commit -m "Update kimi score badge"
          git push || true
        continue-on-error: true

      - name: Run cargo-kimi verify
        run: cargo kimi verify
        continue-on-error: true
